name: Auto Post to Threads

on:
  schedule:
    # JST = UTC+9 なので UTC で設定
    # 07:23 JST = 22:23 UTC (前日)
    - cron: '20 22 * * *'
    # 12:56 JST = 03:56 UTC
    - cron: '53 3 * * *'
    # 15:12 JST = 06:12 UTC
    - cron: '9 6 * * *'
    # 19:49 JST = 10:49 UTC
    - cron: '46 10 * * *'
    # 21:33 JST = 12:33 UTC
    - cron: '30 12 * * *'
    # 22:39 JST = 13:39 UTC
    - cron: '36 13 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post scheduled content
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python post_scheduled.py

      - name: Commit schedule updates
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Mark posted [skip ci]"
          git push
